name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Single deployment at a time. Cancel in-flight runs when a new commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ZIG_VERSION: "0.16.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-cache-docs-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-docs-${{ env.ZIG_VERSION }}-

      - name: build docs
        run: zig build docs

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: zig-out/docs

      - id: deployment
        uses: actions/deploy-pages@v5
