name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: "0.16.0"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # x86_64-linux
          - ubuntu-24.04-arm   # aarch64-linux
          - macos-latest       # aarch64-macos
          - windows-latest     # x86_64-windows
    steps:
      - uses: actions/checkout@v4
      - name: install zig (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    triple=x86_64-linux ;;
            Linux-ARM64)  triple=aarch64-linux ;;
            macOS-ARM64)  triple=aarch64-macos ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-${triple}-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-${triple}-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: install zig (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/zig-x86_64-windows-$env:ZIG_VERSION.zip"
          $dst = Join-Path $env:USERPROFILE 'zig'
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Invoke-WebRequest -Uri $url -OutFile zig.zip
          Expand-Archive -LiteralPath zig.zip -DestinationPath $dst
          "$dst\zig-x86_64-windows-$env:ZIG_VERSION" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: test
        run: zig build test --summary all
      - name: build examples
        run: zig build examples

  # Cross-compile only (no test execution). Covers the width, endianness,
  # and ISA axes not exercised by the native `test` runners.
  cross-compile:
    name: cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-macos          # Intel macOS
          - aarch64-windows       # ARM Windows
          - x86-linux             # 32-bit little-endian
          - arm-linux-gnueabihf   # 32-bit little-endian (ARM)
          - mips-linux-gnueabihf  # 32-bit big-endian
          - powerpc64-linux-gnu   # 64-bit big-endian
          - riscv64-linux-gnu     # 64-bit little-endian (RISC-V)
          - wasm32-wasi           # 32-bit wasm
    steps:
      - uses: actions/checkout@v4
      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
