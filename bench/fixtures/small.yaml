name: telemetry-agent
version: 1.4.2
debug: false
max_connections: 512
timeout_ms: 2500.5
tags:
  - edge
  - collector
  - production
  - ipv6
server:
  host: 0.0.0.0
  port: 8443
  tls:
    enabled: true
    cert_path: /etc/agent/tls/server.crt
    key_path: /etc/agent/tls/server.key
    min_version: "1.3"
upstream:
  endpoints:
    - https://ingest-a.example.com/v1/metrics
    - https://ingest-b.example.com/v1/metrics
    - https://ingest-c.example.com/v1/metrics
  retry:
    max_attempts: 5
    backoff_base_ms: 100
    backoff_factor: 2.0
    jitter: true
limits:
  queue_depth: 8192
  batch_size: 256
  flush_interval_ms: 1000
  max_payload_bytes: 1048576
  drop_on_overflow: false
log:
  level: info
  format: json
  path: /var/log/agent/agent.log
  rotate_mb: 64
features:
  compression: zstd
  dedupe: true
  sampling_rate: 0.25
  histogram_buckets:
    - 0.005
    - 0.01
    - 0.025
    - 0.05
    - 0.1
    - 0.25
    - 0.5
    - 1.0
    - 2.5
    - 5.0
